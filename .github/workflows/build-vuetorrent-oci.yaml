name: Build VueTorrent OCI Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'VueTorrent version to build (e.g., v2.28.2)'
        required: true
        # renovate: datasource=github-releases depName=VueTorrent/VueTorrent
        default: 'v2.28.2'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-vuetorrent-oci.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vuetorrent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and prepare VueTorrent
        run: |
          VERSION="${{ github.event.inputs.version || 'v2.28.2' }}"
          echo "Building VueTorrent version $VERSION"
          
          mkdir -p workspace
          cd workspace
          
          echo "Downloading $VERSION..."
          curl -L -s "https://github.com/VueTorrent/VueTorrent/releases/download/${VERSION}/vuetorrent.zip" -o vuetorrent.zip
          unzip -q vuetorrent.zip
          
          # The zip contains a 'vuetorrent' folder. We want its contents (like 'public') 
          # to be at the root of our OCI artifact.
          mv vuetorrent/* .
          rm -rf vuetorrent vuetorrent.zip
          
          # Create a minimal Dockerfile that uses scratch
          cat << 'EOF' > Dockerfile
          FROM scratch
          COPY . /
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: workspace
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version || 'v2.28.2' }}
