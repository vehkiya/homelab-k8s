name: Build VueTorrent OCI Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'VueTorrent version to build (e.g., v2.28.2)'
        required: true
        # renovate: datasource=github-releases depName=VueTorrent/VueTorrent
        default: 'v2.28.2'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-vuetorrent-oci.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vuetorrent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and prepare VueTorrent
        run: |
          VERSION="${{ github.event.inputs.version || 'v2.28.2' }}"
          echo "Building VueTorrent version $VERSION"
          
          mkdir -p workspace
          cd workspace
          
          echo "Downloading $VERSION..."
          curl -L -s "https://github.com/VueTorrent/VueTorrent/releases/download/${VERSION}/vuetorrent.zip" -o vuetorrent.zip
          unzip -q vuetorrent.zip
          
          # The zip contains a 'vuetorrent' folder. We want its contents (like 'public') 
          # to be at the root of our OCI artifact.
          mv vuetorrent/* .
          rm -rf vuetorrent vuetorrent.zip
          
          # Create a minimal Dockerfile that uses scratch
          cat << 'EOF' > Dockerfile
          FROM scratch
          COPY . /
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: workspace
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version || 'v2.28.2' }}
