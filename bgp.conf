# default to using syslog. /etc/rsyslog.d/45-frr.conf places the log in
# /var/log/frr/frr.log
#
# Note:
# FRR's configuration shell, vtysh, dynamically edits the live, in-memory
# configuration while FRR is running. When instructed, vtysh will persist the
# live configuration to this file, overwriting its contents. If you want to
# avoid this, you can edit this file manually before starting FRR, or instruct
# vtysh to write configuration to a different file.
log syslog informational
#

! -*- bgp -*-
!
hostname $UDMP_HOSTNAME
frr defaults traditional
log file stdout
!
router bgp 65000
 bgp ebgp-requires-policy
 bgp router-id 10.10.1.1
 maximum-paths 1
 !
 ! --- IPv4 Peer Group ---
 neighbor CI_V4 peer-group
 neighbor CI_V4 remote-as 65512
 neighbor CI_V4 soft-reconfiguration inbound
 neighbor CI_V4 timers 15 45
 neighbor CI_V4 timers connect 15
 !
 ! --- IPv6 Peer Group ---
 neighbor CI_V6 peer-group
 neighbor CI_V6 remote-as 65512
 neighbor CI_V6 soft-reconfiguration inbound
 neighbor CI_V6 timers 15 45
 neighbor CI_V6 timers connect 15
 !
 ! Neighbors for Cilium IPv4
 neighbor 10.10.1.101 peer-group CI_V4
 neighbor 10.10.1.102 peer-group CI_V4
 neighbor 10.10.1.103 peer-group CI_V4
 neighbor 10.10.1.201 peer-group CI_V4
 !
 ! Neighbors for Cilium IPv6
 neighbor fd00:10:244::101 peer-group CI_V6
 neighbor fd00:10:244::102 peer-group CI_V6
 neighbor fd00:10:244::103 peer-group CI_V6
 neighbor fd00:10:244::201 peer-group CI_V6
 !
 address-family ipv4 unicast
  neighbor CI_V4 activate
  neighbor CI_V4 route-map ALLOW-ALL in
  neighbor CI_V4 route-map ALLOW-ALL out
  neighbor CI_V4 next-hop-self
  ! Explicitly disable IPv4 on the IPv6 group
  no neighbor CI_V6 activate
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor CI_V6 activate
  neighbor CI_V6 route-map ALLOW-ALL in
  neighbor CI_V6 route-map ALLOW-ALL out
  neighbor CI_V6 next-hop-self
  ! Explicitly disable IPv6 on the IPv4 group
  no neighbor CI_V4 activate
 exit-address-family
 !
route-map ALLOW-ALL permit 10
!
line vty
!