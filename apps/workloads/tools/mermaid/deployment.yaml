apiVersion: apps/v1
kind: Deployment
metadata:
  name: mermaid
spec:
  selector:
    matchLabels:
      app: mermaid
  template:
    metadata:
      labels:
        app: mermaid
        networking/expose-web-ui: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: mermaid
          image: ghcr.io/mermaid-js/mermaid-live-editor
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          imagePullPolicy: "IfNotPresent"
          ports:
            - name: web-ui
              containerPort: 8080
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
