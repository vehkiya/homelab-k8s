apiVersion: apps/v1
kind: Deployment
metadata:
  name: thelounge
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: thelounge
  template:
    metadata:
      labels:
        app: thelounge
        networking/expose-web-ui: "true"
    spec:
      containers:
        - name: thelounge
          image: ghcr.io/thelounge/thelounge
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "128Mi"
          ports:
            - name: web-ui
              containerPort: 9000
          volumeMounts:
            - name: config
              mountPath: /var/opt/thelounge
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: the-lounge-config-pvc
