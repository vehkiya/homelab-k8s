apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: auth-whoami
  labels:
    app.kubernetes.io/instance: "authelia"
    app.kubernetes.io/name: "authelia"
spec:
  forwardAuth:
    address: "http://authelia.security.svc.cluster.local:9091/api/authz/forward-auth"
    trustForwardHeader: true
    maxResponseBodySize: 2097152
    authResponseHeaders:
      - "Remote-User"
      - "Remote-Groups"
      - "Remote-Email"
      - "Remote-Name"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-route
spec:
  parentRefs:
    - name: internal-gateway
      namespace: traefik
    - name: external-gateway
      namespace: traefik
  hostnames:
    - "whoami.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keda-add-ons-http-interceptor-proxy
          namespace: networking
          port: 8080
      filters:
        - type: ExtensionRef
          extensionRef:
            group: "traefik.io"
            kind: "Middleware"
            name: "auth-whoami"
