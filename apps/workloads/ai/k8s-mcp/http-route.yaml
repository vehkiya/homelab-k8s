apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8s-mcp-route
  namespace: ai
spec:
  parentRefs:
    - name: internal-gateway
      namespace: traefik
  hostnames:
    - "mcp.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: k8s-mcp
          port: 8080
