apiVersion: apps/v1
kind: Deployment
metadata:
  name: snowflakes
  labels:
    app: snowflakes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snowflakes
  template:
    metadata:
      labels:
        app: snowflakes
    spec:
      containers:
        - name: snowflakes
          image: ghcr.io/fluxerapp/fluxer-snowflakes:v1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: fluxer-config
            - secretRef:
                name: fluxer-secrets
          env:
            - name: FLUXER_SVC_MODE
              value: router
---
