apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fluxer-route
spec:
  parentRefs:
    - name: internal-gateway
      namespace: traefik
    - name: external-gateway
      namespace: traefik
  hostnames:
    - "fluxer.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /gateway
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /media
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: media-proxy
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /livekit
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: livekit
          port: 7880
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: admin
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /fonts
        - path:
            type: PathPrefix
            value: /web
        - path:
            type: PathPrefix
            value: /emoji
        - path:
            type: PathPrefix
            value: /libs
        - path:
            type: PathPrefix
            value: /avatars
        - path:
            type: PathPrefix
            value: /badges
        - path:
            type: PathPrefix
            value: /desktop
        - path:
            type: PathPrefix
            value: /embeds
      backendRefs:
        - name: static-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known
      backendRefs:
        - name: api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-proxy
          port: 8080
