apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fluxer-secrets
  annotations:
    vault-uuid: &vault_uuid "e9cb05cd-3292-4300-8bc5-30a2ee11c505"
    meili-uuid: &meili_uuid "7a4a604c-607f-4a9f-a054-66caadf2e083"
spec:
  target:
    name: fluxer-secrets
    template:
      engineVersion: v2
      data:
        FLUXER_POSTGRES_PASSWORD: "{{ .FLUXER_POSTGRES_PASSWORD }}"
        REDIS_PASSWORD: "{{ .REDIS_PASSWORD }}"
        FLUXER_S3_ACCESS_KEY: "{{ .FLUXER_S3_ACCESS_KEY }}"
        FLUXER_S3_ACCESS_KEY_ID: "{{ .FLUXER_S3_ACCESS_KEY_ID }}"
        AWS_ACCESS_KEY_ID: "{{ .AWS_ACCESS_KEY_ID }}"
        FLUXER_S3_SECRET_KEY: "{{ .FLUXER_S3_SECRET_KEY }}"
        FLUXER_S3_SECRET_ACCESS_KEY: "{{ .FLUXER_S3_SECRET_ACCESS_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .AWS_SECRET_ACCESS_KEY }}"
        LIVEKIT_API_KEY: "{{ .LIVEKIT_API_KEY }}"
        FLUXER_LIVEKIT_API_KEY: "{{ .FLUXER_LIVEKIT_API_KEY }}"
        LIVEKIT_API_SECRET: "{{ .LIVEKIT_API_SECRET }}"
        FLUXER_LIVEKIT_API_SECRET: "{{ .FLUXER_LIVEKIT_API_SECRET }}"
        FLUXER_SUDO_MODE_SECRET: "{{ .FLUXER_SUDO_MODE_SECRET }}"
        FLUXER_CONNECTION_INITIATION_SECRET: "{{ .FLUXER_CONNECTION_INITIATION_SECRET }}"
        FLUXER_VAPID_PUBLIC_KEY: "{{ .FLUXER_VAPID_PUBLIC_KEY }}"
        FLUXER_VAPID_PRIVATE_KEY: "{{ .FLUXER_VAPID_PRIVATE_KEY }}"
        FLUXER_PASSKEY_ADDITIONAL_ALLOWED_ORIGINS: "https://fluxer.kerrlab.app,https://fluxer.app,https://web.fluxer.app,https://web.canary.fluxer.app,android:apk-key-hash:{{ .FLUXER_VAPID_PUBLIC_KEY }}"
        FLUXER_GATEWAY_RPC_AUTH_TOKEN: "{{ .FLUXER_GATEWAY_RPC_AUTH_TOKEN }}"
        FLUXER_MEDIA_PROXY_SECRET_KEY: "{{ .FLUXER_MEDIA_PROXY_SECRET_KEY }}"
        FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64: "{{ .FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64 }}"
        FLUXER_ADMIN_SECRET_KEY_BASE: "{{ .FLUXER_ADMIN_SECRET_KEY_BASE }}"
        FLUXER_ADMIN_OAUTH_CLIENT_SECRET: "{{ .FLUXER_ADMIN_OAUTH_CLIENT_SECRET }}"
        FLUXER_SEARCH_API_KEY: "{{ .FLUXER_SEARCH_API_KEY }}"
        MEILI_MASTER_KEY: "{{ .MEILI_MASTER_KEY }}"
        FLUXER_EMAIL_SMTP_HOST: "{{ .FLUXER_EMAIL_SMTP_HOST }}"
        FLUXER_EMAIL_SMTP_PORT: "{{ .FLUXER_EMAIL_SMTP_PORT }}"
        FLUXER_EMAIL_SMTP_USERNAME: "{{ .FLUXER_EMAIL_SMTP_USERNAME }}"
        FLUXER_EMAIL_SMTP_PASSWORD: "{{ .FLUXER_EMAIL_SMTP_PASSWORD }}"
  secretStoreRef:
    name: vaultwarden-fields
    kind: ClusterSecretStore
  data:
    # A secure random string for the Postgres user 'fluxer'. Must match the password you set in your external Postgres DB.
    - secretKey: FLUXER_POSTGRES_PASSWORD
      remoteRef:
        key: *vault_uuid
        property: "postgres_password"

    # A secure random string to be used for the Redis authentication.
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: *vault_uuid
        property: "REDIS_PASSWORD"

    # The S3 Access Key generated from your SeaweedFS/MinIO instance.
    - secretKey: FLUXER_S3_ACCESS_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_S3_ACCESS_KEY"
    - secretKey: FLUXER_S3_ACCESS_KEY_ID
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_S3_ACCESS_KEY"
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_S3_ACCESS_KEY"

    # The S3 Secret Key generated from your SeaweedFS/MinIO instance.
    - secretKey: FLUXER_S3_SECRET_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_S3_SECRET_KEY"
    - secretKey: FLUXER_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_S3_SECRET_KEY"
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_S3_SECRET_KEY"

    # A random string to identify the LiveKit API client (e.g. "fluxer-livekit").
    - secretKey: LIVEKIT_API_KEY
      remoteRef:
        key: *vault_uuid
        property: "LIVEKIT_API_KEY"
    - secretKey: FLUXER_LIVEKIT_API_KEY
      remoteRef:
        key: *vault_uuid
        property: "LIVEKIT_API_KEY"

    # A secure random string to authenticate LiveKit API requests.
    - secretKey: LIVEKIT_API_SECRET
      remoteRef:
        key: *vault_uuid
        property: "LIVEKIT_API_SECRET"
    - secretKey: FLUXER_LIVEKIT_API_SECRET
      remoteRef:
        key: *vault_uuid
        property: "LIVEKIT_API_SECRET"

    # A secure random string (e.g. 32+ chars) used for encrypting sudo mode sessions.
    - secretKey: FLUXER_SUDO_MODE_SECRET
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_SUDO_MODE_SECRET"

    # A secure random string (e.g. 32+ chars) used for internal connection handshakes.
    - secretKey: FLUXER_CONNECTION_INITIATION_SECRET
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_CONNECTION_INITIATION_SECRET"

    # VAPID Public Key for Web Push. Generate using `npx web-push generate-vapid-keys`.
    - secretKey: FLUXER_VAPID_PUBLIC_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_VAPID_PUBLIC_KEY"

    # VAPID Private Key for Web Push. Generated alongside the public key above.
    - secretKey: FLUXER_VAPID_PRIVATE_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_VAPID_PRIVATE_KEY"

    # A secure random string to authenticate RPC calls between the gateway and internal services.
    - secretKey: FLUXER_GATEWAY_RPC_AUTH_TOKEN
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_GATEWAY_RPC_AUTH_TOKEN"

    # A secure random string for media proxy authentication.
    - secretKey: FLUXER_MEDIA_PROXY_SECRET_KEY
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_MEDIA_PROXY_SECRET_KEY"

    # A base64-encoded secure random string (e.g. generate via `openssl rand -base64 32`).
    - secretKey: FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_MEDIA_PROXY_UPLOAD_RELAY_SECRET_BASE64"

    # A secure random string (64+ chars) used as the master key base for the admin panel.
    - secretKey: FLUXER_ADMIN_SECRET_KEY_BASE
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_ADMIN_SECRET_KEY_BASE"

    # A secure random string used as the OAuth client secret for admin authentication.
    - secretKey: FLUXER_ADMIN_OAUTH_CLIENT_SECRET
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_ADMIN_OAUTH_CLIENT_SECRET"

    - secretKey: FLUXER_SEARCH_API_KEY
      remoteRef:
        key: *meili_uuid
        property: "MASTER_KEY"
    - secretKey: MEILI_MASTER_KEY
      remoteRef:
        key: *meili_uuid
        property: "MASTER_KEY"

    # SMTP Configuration
    - secretKey: FLUXER_EMAIL_SMTP_HOST
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_EMAIL_SMTP_SERVER"
    - secretKey: FLUXER_EMAIL_SMTP_PORT
      remoteRef:
        key: *vault_uuid
        property: "SMTP_PORT"
    - secretKey: FLUXER_EMAIL_SMTP_USERNAME
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_EMAIL_SMTP_USERNAME"
    - secretKey: FLUXER_EMAIL_SMTP_PASSWORD
      remoteRef:
        key: *vault_uuid
        property: "FLUXER_EMAIL_SMTP_PASSWORD"
