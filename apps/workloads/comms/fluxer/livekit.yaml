apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
data:
  livekit.yaml: |
    port: 7880
    rtc:
      use_external_ip: true
      tcp_port: 7881
      udp_port: 7882
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  labels:
    app: livekit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      enableServiceLinks: false
      containers:
        - name: livekit
          image: livekit/livekit-server:v1.12.0@sha256:b1281e66e35e8f9749ffbcf0fe6ab4d40d1438aa00f36c2ea7e6975e5e261e2e
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          command:
            - /livekit-server
            - --config
            - /etc/livekit/livekit.yaml
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fluxer-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: fluxer-secrets
                  key: LIVEKIT_API_SECRET
            - name: LIVEKIT_KEYS
              value: "$(LIVEKIT_API_KEY): $(LIVEKIT_API_SECRET)"
          ports:
            - containerPort: 7880
              name: http
            - containerPort: 7881
              name: tcp-media
            - containerPort: 7882
              protocol: UDP
              name: udp-media
          volumeMounts:
            - name: config
              mountPath: /etc/livekit
      volumes:
        - name: config
          configMap:
            name: livekit-config
---
apiVersion: v1
kind: Service
metadata:
  name: livekit
  labels:
    pool: dmz-lb-pool
  annotations:
    lbipam.cilium.io/ips: "10.20.1.180"
spec:
  selector:
    app: livekit
  ports:
    - name: http
      port: 7880
      targetPort: 7880
    - name: tcp-media
      port: 7881
      targetPort: 7881
    - name: udp-media
      port: 7882
      protocol: UDP
      targetPort: 7882
  type: LoadBalancer
  externalTrafficPolicy: Local
