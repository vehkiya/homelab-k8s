apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media
resources:
  - secret.yaml
  - network-policies.yaml
  - cronjob.yaml

configMapGenerator:
  - name: kometa-config
    files:
      - config.yml=templates/config.yml
  - name: kometa-anime-config
    files:
      - anime.yaml=templates/anime.yaml
  - name: kometa-movie-config
    files:
      - movies.yaml=templates/movies.yaml
  - name: kometa-overlay-config
    files:
      - overlay.yaml=templates/overlay.yaml
  - name: kometa-tv-config
    files:
      - tv.yaml=templates/tv.yaml

generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: kometa
      app.kubernetes.io/part-of: media-services
images:
  - name: alpine/k8s
    newTag: 1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
  - name: kometateam/kometa
    newTag: v2.4.5@sha256:a376a1818196cde159b5a4d5a6ad55411415f7b5bc38d8a27e8c718bae7f0ddd
