apiVersion: batch/v1
kind: CronJob
metadata:
  name: kometa
spec:
  schedule: "0 0,12 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: kometa
        spec:
          securityContext:
            fsGroup: 100
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 100
            runAsNonRoot: true
            runAsUser: 1027
          dnsPolicy: None
          dnsConfig:
            searches:
              - iot.svc.cluster.local
              - svc.cluster.local
              - cluster.local
            nameservers:
              - 10.96.0.10
            options:
              - name: ndots
                value: "5"
          initContainers:
            - name: prepare-config
              image: alpine/k8s
              securityContext:
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  echo "🚀 Starting Configuration Processing..."
                  echo "--------------------------------------------------"

                  CONFIG_TEMPLATE_PATH="/config_templates/config.yml"
                  FINAL_CONFIG_PATH="/config/config.yml"

                  echo "ℹ️ Template Path: $CONFIG_TEMPLATE_PATH"
                  echo "ℹ️ Output Path: $FINAL_CONFIG_PATH"
                  echo "--------------------------------------------------"

                  if [ "${DEBUG_ENABLED}" = "true" ]; then
                    echo "🔎 Debug: Initial contents of /config directory:"
                    ls -las /config
                    echo "--------------------------------------------------"
                    echo "🔎 Debug: Initial contents of /config_templates directory:"
                    ls -las /config_templates
                    echo "--------------------------------------------------"
                  fi

                  if [ ! -f "$CONFIG_TEMPLATE_PATH" ]; then
                    echo "❌ ERROR: Config template '$CONFIG_TEMPLATE_PATH' not found! Aborting."
                    exit 1
                  fi

                  if [ "${DEBUG_ENABLED}" = "true" ]; then
                    echo "📄 Displaying contents of template '$CONFIG_TEMPLATE_PATH':"
                    cat "$CONFIG_TEMPLATE_PATH"
                    echo "--------------------------------------------------"
                  fi

                  echo "⚙️  Generating final configuration file from template..."
                  if envsubst < "$CONFIG_TEMPLATE_PATH" > "$FINAL_CONFIG_PATH"; then
                    echo "✅ Final configuration file '$FINAL_CONFIG_PATH' generated successfully."
                  else
                    echo "❌ ERROR: Failed to generate configuration file '$FINAL_CONFIG_PATH'."
                    exit 1
                  fi
                  echo "--------------------------------------------------"

                  if [ "${DEBUG_ENABLED}" = "true" ]; then
                    echo "📄 Displaying contents of generated configuration file '$FINAL_CONFIG_PATH':"
                    cat "$FINAL_CONFIG_PATH"
                    echo "--------------------------------------------------"
                    echo "🔎 Debug: Contents of /config directory after processing:"
                    ls -la /config
                    echo "--------------------------------------------------"
                  fi

                  echo "🎉 Main configuration processing complete."
                  echo ""
                  echo "--- Processing Additional Configuration Details ---"
                  echo "📄 Processing custom fonts..."
                  FONT_LIST="Montserrat-Medium.ttf"
                  FONT_SOURCE_DIR="/tmp/fonts"
                  FONT_DEST_DIR="/config/fonts"

                  for FONT_FILENAME in $FONT_LIST; do
                    FONT_SOURCE_PATH=$(find "$FONT_SOURCE_DIR" -type f -name "$FONT_FILENAME" | head -n 1)
                    FONT_DEST_PATH="$FONT_DEST_DIR/$FONT_FILENAME"
                    if [ -n "$FONT_SOURCE_PATH" ] && [ ! -f "$FONT_DEST_PATH" ]; then
                      echo "ℹ️ Font '$FONT_FILENAME' not found in destination. Copying..."
                      cp "$FONT_SOURCE_PATH" "$FONT_DEST_PATH"
                    elif [ -f "$FONT_DEST_PATH" ]; then
                      echo "Font '$FONT_FILENAME' already exists. Skipping."
                    else
                      echo "⚠️ WARNING: Font '$FONT_FILENAME' not found in source directory '$FONT_SOURCE_DIR'."
                    fi
                  done
                  echo "✅ Font processing complete"

                  ASSETS_FOLDER="/assets"
                  echo "ℹ️ Target Assets Folder: $ASSETS_FOLDER"

                  if [ ! -d "$ASSETS_FOLDER" ]; then
                    echo "📂 Assets folder '$ASSETS_FOLDER' does not exist. Attempting to create..."
                    if mkdir -p "$ASSETS_FOLDER"; then
                      echo "✅ Assets folder '$ASSETS_FOLDER' created successfully."
                    else
                      echo "⚠️ WARN: Failed to create assets folder '$ASSETS_FOLDER'."
                    fi
                  else
                    echo "👍 Assets folder '$ASSETS_FOLDER' already exists. No action taken."
                  fi
                  echo "--------------------------------------------------"
                  echo "🏁 All configuration processing finished."
              env:
                - name: DEBUG_ENABLED
                  value: "false"
              envFrom:
                - secretRef:
                    name: kometa-secrets
              resources:
                requests:
                  cpu: "10m"
                  memory: "64Mi"
                limits:
                  cpu: "50m"
                  memory: "128Mi"
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: kometa-config
                  mountPath: /config_templates/config.yml
                  subPath: config.yml
                - name: media
                  subPath: assets
                  mountPath: /assets
                - name: fonts
                  mountPath: /tmp/fonts
                  readOnly: true
          containers:
            - name: kometa
              image: kometateam/kometa
              imagePullPolicy: IfNotPresent
              args: ["--run", "--read-only-config"]
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: media
                  subPath: assets
                  mountPath: /assets
                - name: movie-config
                  mountPath: /config/movies.yaml
                  subPath: movies.yaml
                - name: tv-config
                  mountPath: /config/tv.yaml
                  subPath: tv.yaml
                - name: anime-config
                  mountPath: /config/anime.yaml
                  subPath: anime.yaml
                - name: overlay-config
                  mountPath: /config/overlay.yaml
                  subPath: overlay.yaml
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: kometa-config-pvc
            - name: kometa-config
              configMap:
                name: kometa-config
            - name: movie-config
              configMap:
                name: kometa-movie-config
            - name: tv-config
              configMap:
                name: kometa-tv-config
            - name: anime-config
              configMap:
                name: kometa-anime-config
            - name: overlay-config
              configMap:
                name: kometa-overlay-config
            - name: media
              persistentVolumeClaim:
                claimName: media-pvc
            - name: fonts
              persistentVolumeClaim:
                claimName: fonts-pvc
          restartPolicy: OnFailure
