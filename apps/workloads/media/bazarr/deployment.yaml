apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
        networking/expose-web-ui: "true"
    spec:
      containers:
        - name: bazarr
          image: ghcr.io/home-operations/bazarr
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              cpu: 1000m
              memory: 500Mi
          env:
            - name: PGID
              value: "100"
            - name: PUID
              value: "1027"
            - name: TZ
              value: "Europe/Chisinau"
          envFrom:
            - configMapRef:
                name: bazarr-config
            - secretRef:
                name: bazarr-secrets
          ports:
            - name: web-ui
              containerPort: 6767
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/system/ping
              port: web-ui
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/system/ping
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/system/ping
              port: web-ui
          volumeMounts:
            - name: media
              mountPath: /data
            - name: bazarr-config-pvc
              mountPath: /config
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 100
        runAsNonRoot: true
        runAsUser: 1027
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: bazarr-config-pvc
          persistentVolumeClaim:
            claimName: bazarr-config-longhorn-pvc
