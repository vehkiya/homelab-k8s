apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: bazarr-policy
spec:
  endpointSelector:
    matchLabels:
      app: bazarr


  # ----=== Egress ===----
  egress:
    # === Allow access to services ===
    - toServices:
        - k8sService:
            serviceName: plex-ui
            namespace: media
        - k8sService:
            serviceName: qbittorrent-ui
            namespace: media
        - k8sService:
            serviceName: sonarr-tv-ui
            namespace: media
        - k8sService:
            serviceName: sonarr-anime-ui
            namespace: media
        - k8sService:
            serviceName: radarr-ui
            namespace: media
        - k8sService:
            serviceName: ntfy
            namespace: automation
    # === Allow access to Postgres on Fortress ===
    - toCIDR:
        - "10.10.1.218/32"
      toPorts:
        - ports:
            - port: "15432"
              protocol: TCP
    # === Allow access to external for subtitles ===
    - toEntities:
        - "world"
