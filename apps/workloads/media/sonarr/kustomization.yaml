apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment-tv.yaml
  - deployment-anime.yaml
  - service.yaml
  - http-route.yaml
  - network-policy.yaml
  - secret-tv.yaml
  - secret-anime.yaml

labels:
  - pairs:
      app.kubernetes.io/name: sonarr
      app.kubernetes.io/part-of: media-services
images:
  - name: ghcr.io/home-operations/sonarr
    newTag: 4.0.17@sha256:6806001ccc2ec95d941c9c0de012dbcb59c6a33932cfc17f71e300bdd48cabfe
  - name: ghcr.io/hononeko/k8s-config-tools
    newTag: 0.1.0@sha256:fa8e55d5c4b2971076cc2dfd70ff15f1c1734245de6bb109190e744a86cb9e94

# Shared config for both instances
configMapGenerator:
  - name: sonarr-tv-config-template
    files:
      - config.xml=templates/tv-config.xml
  - name: sonarr-anime-config-template
    files:
      - config.xml=templates/anime-config.xml
generatorOptions:
  disableNameSuffixHash: true
