apiVersion: v1
kind: ConfigMap
metadata:
  name: autobrr-config
data:
  AUTOBRR__OIDC_ENABLED: "true"
  AUTOBRR__OIDC_ISSUER: "https://auth.kerrlab.app"
  AUTOBRR__OIDC_CLIENT_ID: "autobrr"
  AUTOBRR__OIDC_REDIRECT_URL: "https://autobrr.kerrlab.app/api/auth/oidc/callback"
  AUTOBRR__OIDC_DISABLE_BUILT_IN_LOGIN: "true"
  AUTOBRR__DATABASE_TYPE: "postgres"
  AUTOBRR__POSTGRES_DATABASE: "autobrr"
  AUTOBRR__POSTGRES_SSLMODE: "disable"
  AUTOBRR__LOG_LEVEL: "INFO"
  AUTOBRR__HOST: "0.0.0.0"
  AUTOBRR__PORT: "7474"
  AUTOBRR__BASE_URL: "/"
