apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpackerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unpackerr
  template:
    metadata:
      labels:
        app: unpackerr
    spec:
      containers:
        - name: unpackerr
          image: ghcr.io/unpackerr/unpackerr
          envFrom:
            - configMapRef:
                name: unpackerr-config
          env:
            - name: UN_RADARR_0_API_KEY
              valueFrom:
                secretKeyRef: { name: unpackerr-app-secrets, key: radarr_key }
            - name: UN_SONARR_0_API_KEY
              valueFrom:
                secretKeyRef: { name: unpackerr-app-secrets, key: sonarr_tv_key }
            - name: UN_SONARR_1_API_KEY
              valueFrom:
                secretKeyRef: { name: unpackerr-app-secrets, key: sonarr_anime_key }
          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: downloads-mount
              mountPath: /data # Path inside the container
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 100
        runAsNonRoot: true
        runAsUser: 1027
      volumes:
        - name: downloads-mount
          persistentVolumeClaim:
            claimName: media-pvc
