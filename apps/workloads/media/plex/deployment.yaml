apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
        networking/expose-web-ui: "true"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - performance
      terminationGracePeriodSeconds: 30
      containers:
        - name: plex
          image: plexinc/pms-docker
          env:
            - name: TZ
              value: "Europe/Chisinau"
            - name: ADVERTISE_IP
              value: https://plex.kerrlab.app
            - name: PLEX_UID
              value: "1027"
            - name: PLEX_GID
              value: "100"
          envFrom:
            - secretRef:
                name: plex-secret
          ports:
            - name: web-ui
              containerPort: 32400
              protocol: TCP
          startupProbe:
            httpGet:
              path: /identity
              port: web-ui
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /identity
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /identity
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: media
              mountPath: /data
            - name: config
              mountPath: /config
            - name: transcode
              mountPath: /transcode
            - name: backups
              mountPath: /backups
          resources:
            # only rune on nodes that have Intel GPU
            requests:
              cpu: 1000m
              memory: 2Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: 8000m
              memory: 8Gi
              gpu.intel.com/i915: "1"
        - name: backup-sidecar
          image: ghcr.io/hononeko/k8s-backup-tools:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1027
            runAsGroup: 100
          command:
            - /bin/sh
            - -c
            - |
              PREFS_PATH="/config/Library/Application Support/Plex Media Server/Preferences.xml"
              echo "🚀 Backup Sidecar Started (Inotify Mode)."
              echo "👀 Watching /backups for native Plex DB backups..."
              inotifywait -m -e close_write -q --format "%f" /backups/ | while read -r filename; do
                if echo "$filename" | grep -qEo '^com\.plexapp\.plugins\.library\.db-[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                  DATE_SUFFIX="${filename##*-}"
                  echo "💾 Detected Plex native DB backup: $filename"
              
                  if [ -f "$PREFS_PATH" ]; then
                    echo "⚙️  Backing up Preferences.xml as Preferences.xml-$DATE_SUFFIX..."
                    rsync -a --no-owner --no-group "$PREFS_PATH" "/backups/Preferences.xml-$DATE_SUFFIX"
                    echo "✅ Preferences backup complete!"
                  fi
              
                  echo "🧹 Cleaning up old Preferences.xml backups (keeping last 5)..."
                  ls -dt /backups/Preferences.xml-* 2>/dev/null | tail -n +6 | xargs -r rm -f
                fi
              done
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: backups
              mountPath: /backups
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-longhorn-pvc
        - name: transcode
          persistentVolumeClaim:
            claimName: plex-transcode-pvc
        - name: backups
          persistentVolumeClaim:
            claimName: plex-backup-pvc
