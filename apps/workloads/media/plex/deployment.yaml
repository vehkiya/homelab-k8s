apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
        networking/expose-web-ui: "true"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - performance
      terminationGracePeriodSeconds: 30
      containers:
        - name: plex
          image: plexinc/pms-docker
          env:
            - name: TZ
              value: "Europe/Chisinau"
            - name: ADVERTISE_IP
              value: https://plex.kerrlab.app
            - name: PLEX_UID
              value: "1027"
            - name: PLEX_GID
              value: "100"
          envFrom:
            - secretRef:
                name: plex-secret
          ports:
            - name: web-ui
              containerPort: 32400
              protocol: TCP
          startupProbe:
            httpGet:
              path: /identity
              port: web-ui
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /identity
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /identity
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: media
              mountPath: /data
            - name: config
              mountPath: /config
            - name: transcode
              mountPath: /transcode
          resources:
            # only rune on nodes that have Intel GPU
            requests:
              cpu: 1000m
              memory: 2Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: 8000m
              memory: 8Gi
              gpu.intel.com/i915: "1"
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-longhorn-pvc
        - name: transcode
          persistentVolumeClaim:
            claimName: plex-transcode-pvc
