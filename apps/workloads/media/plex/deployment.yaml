apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
        networking/expose-web-ui: "true"
    spec:
      resourceClaims:
        - name: intel-gpu
          resourceClaimTemplateName: intel-gpu-claim-template
      affinity:
        nodeAffinity:
          # NOTE: Hard-pinned to 'performance' nodes because Kubernetes DRA (Dynamic Resource Allocation)
          # allocator ignores soft preferredDuringScheduling constraints during device allocation.
          # Revert to preferredDuringScheduling once DRA supports soft constraints.
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - performance
      terminationGracePeriodSeconds: 30
      containers:
        - name: plex
          image: plexinc/pms-docker
          env:
            - name: TZ
              value: "Europe/Chisinau"
            - name: ADVERTISE_IP
              value: https://plex.kerrlab.app
            - name: PLEX_UID
              value: "1027"
            - name: PLEX_GID
              value: "100"
          envFrom:
            - secretRef:
                name: plex-secret
          ports:
            - name: web-ui
              containerPort: 32400
              protocol: TCP
          startupProbe:
            httpGet:
              path: /identity
              port: web-ui
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /identity
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /identity
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          volumeMounts:
            - name: media
              mountPath: /data
            - name: config
              mountPath: /config
            - name: transcode
              mountPath: /transcode
            - name: backups
              mountPath: /backups
          resources:
            # only rune on nodes that have Intel GPU
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "16Gi"
            claims:
              - name: intel-gpu
        - name: backup-sidecar
          image: ghcr.io/hononeko/k8s-backup-tools:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1027
            runAsGroup: 100
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - /scripts/backup.sh
          volumeMounts:
            - name: backup-script
              mountPath: /scripts/backup.sh
              subPath: backup.sh
              readOnly: true
            - name: config
              mountPath: /config
              readOnly: true
            - name: backups
              mountPath: /backups
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      volumes:
        - name: backup-script
          configMap:
            name: plex-backup-script
            defaultMode: 0755
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-longhorn-pvc
        - name: transcode
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        - name: backups
          persistentVolumeClaim:
            claimName: plex-backup-pvc
