apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: plex
    recurring-job.longhorn.io/source: "enabled"
    recurring-job.longhorn.io/daily-s3-backup: "enabled"
  name: plex-config-longhorn-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn-retain
  volumeMode: Filesystem
