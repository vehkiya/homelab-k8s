apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - rate-limit.yaml
  - network-policy.yaml
  - restore-job.yaml

configMapGenerator:
  - name: plex-backup-script
    files:
      - backup.sh=scripts/backup.sh
  - name: plex-restore-script
    files:
      - restore.sh=scripts/restore.sh

labels:
  - pairs:
      app.kubernetes.io/name: plex
      app.kubernetes.io/part-of: media-services
images:
  - name: plexinc/pms-docker
    newTag: 1.43.2.10687-563d026ea@sha256:c37106c57fed7a6624f5dee5a3ce460ff011f09a2aa7f4ee9e8dbbd08ae1b87e
  - name: alpine
    newTag: latest@sha256:f5064d3e5f88c467c714509f491853ab2d951932c5cad699c0cb969dcec6f3b4
