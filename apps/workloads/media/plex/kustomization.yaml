apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - rate-limit.yaml
  - network-policy.yaml
  - restore-job.yaml

configMapGenerator:
  - name: plex-backup-script
    files:
      - backup.sh=scripts/backup.sh
  - name: plex-restore-script
    files:
      - restore.sh=scripts/restore.sh

labels:
  - pairs:
      app.kubernetes.io/name: plex
      app.kubernetes.io/part-of: media-services
images:
  - name: plexinc/pms-docker
    newTag: 1.43.3.10828-00f62d37d@sha256:a2b03d75aa16f422488c692935cab476d966b75f2af3c93bb6d910c6051906f5
  - name: alpine
    newTag: latest@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
