apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qbittorrent
spec:
  serviceName: qbittorrent
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
        networking/expose-web-ui: "true"
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1 # A higher weight means a stronger preference
              preference:
                matchExpressions:
                  - key: networkSpeed
                    operator: In
                    values:
                      - "2.5G"
      initContainers:
        - name: gluetun
          image: ghcr.io/qdm12/gluetun
          restartPolicy: Always # Declares this as a native sidecar
          command:
            - /bin/sh
            - -c
            - |
              ip rule del table 51820 2>/dev/null || true
              ip -6 rule del table 51820 2>/dev/null || true
              exec /gluetun-entrypoint
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: SERVER_COUNTRIES
              value: "Switzerland"
            - name: PORT_FORWARDING
              value: "on"
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: FIREWALL_INPUT_PORTS
              value: "8080,9091,9999"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.244.0.0/16,10.10.0.0/16,fdf0:10:244::/48"
            - name: DNS_ADDRESS
              value: "10.96.0.10"
            - name: DOT
              value: "off"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: HEALTH_SERVER_ADDRESS
              value: "0.0.0.0:9999"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-secret
                  key: WIREGUARD_PRIVATE_KEY
          volumeMounts:
            - name: gluetun-port-data
              mountPath: /tmp/gluetun
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /
              port: 9999
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 9999
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      containers:
        - name: qbittorrent
          image: ghcr.io/home-operations/qbittorrent
          env:
            - name: TZ
              value: "Europe/Chisinau"
            - name: WEBUI_PATH
              value: "/vuetorrent"
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: qbit-secrets
                  key: WEBHOOK_SECRET
            - name: WEBHOOK_ID
              valueFrom:
                secretKeyRef:
                  name: qbit-secrets
                  key: WEBHOOK_ID
          ports:
            - name: web-ui
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /
              port: web-ui
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: media
              mountPath: /data
            - name: config
              mountPath: /config
            - name: vuetorrent-webui
              mountPath: /vuetorrent
            - name: gluetun-port-data
              mountPath: /tmp/gluetun
              readOnly: true
            - name: scripts-volume
              mountPath: /scripts
          resources:
            requests:
              cpu: "25m"
              memory: "384Mi"
            limits:
              cpu: "1500m"
              memory: "4Gi"
          securityContext:
            runAsGroup: 100
            runAsNonRoot: true
            runAsUser: 1027
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
        - name: qbit-port-sync
          image: ghcr.io/hononeko/qbit-gluetun-sync
          env:
            - name: QBIT_ADDR
              value: "http://localhost:8080"
            - name: PORT_FILE
              value: "/tmp/gluetun/forwarded_port"
            - name: LISTEN_PORT
              value: "9091"
          ports:
            - name: health
              containerPort: 9091
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: gluetun-port-data
              mountPath: /tmp/gluetun
              readOnly: true
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "25m"
              memory: "32Mi"
          securityContext:
            runAsUser: 1027
            runAsGroup: 100
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
        - name: qbit-ntfy
          image: ghcr.io/hononeko/qbit-ntfy-sidecar
          env:
            - name: QBIT_HOST
              value: "http://localhost:8080"
            - name: NTFY_SERVER
              value: "http://ntfy.automation.svc.cluster.local"
            - name: NTFY_TOPIC
              value: "downloads-live-updates"
            - name: NTFY_PRIORITY_PROGRESS
              value: "low"
            - name: NTFY_PRIORITY_COMPLETE
              value: "default"
            - name: NOTIFY_COMPLETE
              value: "true"
            - name: PROGRESS_FORMAT
              value: "bar"
            - name: ALLOWED_SUBNETS
              value: "127.0.0.1/32,::1/128"
            - name: POLL_INTERVAL
              value: "30"
          envFrom:
            - secretRef:
                name: ntfy-credentials
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config-longhorn-pvc
        - name: vuetorrent-webui
          image:
            # renovate: datasource=github-releases depName=VueTorrent/VueTorrent
            reference: ghcr.io/vehkiya/vuetorrent:v2.28.2
        - name: gluetun-port-data
          emptyDir: {}
        - name: scripts-volume
          configMap:
            name: qbittorrent-scripts
            defaultMode: 0755
