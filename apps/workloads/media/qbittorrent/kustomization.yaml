apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media
resources:
  - statefulset.yaml
  - service.yaml
  - http-route.yaml
  - network-policy.yaml
  - ntfy-credentials-secret.yaml
  - vpn-secret.yaml
  - qbit-secrets.yaml

configMapGenerator:
  - name: qbittorrent-scripts
    files:
      - notify-n8n.sh=templates/notify-n8n.sh
generatorOptions:
  disableNameSuffixHash: true

labels:
