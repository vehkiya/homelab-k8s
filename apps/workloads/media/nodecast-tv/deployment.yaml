apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodecast-tv
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nodecast-tv
  template:
    metadata:
      labels:
        app: nodecast-tv
        networking/expose-web-ui: "true"
    spec:
      resourceClaims:
        - name: intel-gpu
          resourceClaimTemplateName: intel-gpu-claim-template
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: NotIn
                    values:
                      - performance
      containers:
        - name: nodecast-tv
          image: ghcr.io/technomancer702/nodecast-tv
          env:
            - name: TZ
              value: "Europe/Chisinau"
            - name: NODE_ENV
              value: "production"
            - name: OIDC_ISSUER_URL
              value: "https://auth.kerrlab.app"
            - name: OIDC_CLIENT_ID
              value: "nodecast"
            - name: OIDC_CALLBACK_URL
              value: "https://nodecast.kerrlab.app/api/auth/oidc/callback"
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nodecast-secrets
                  key: OIDC_CLIENT_SECRET
          ports:
            - name: web-ui
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: web-ui
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: web-ui
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/data
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "250Mi"
            claims:
              - name: intel-gpu
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: nodecast-tv-config-pvc
