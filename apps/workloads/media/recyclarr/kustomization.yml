apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cronjob.yml
  - secret.yml
  - network-policy.yml

labels:
  - pairs:
      app.kubernetes.io/name: recyclarr
      app.kubernetes.io/part-of: media-services

images:
  - name: ghcr.io/recyclarr/recyclarr
    newTag: 8.6.0@sha256:3c38ceeb54438dd8327e4e65c9b48ba601a6d20fff833342d93c9b0bc4b1930b

configMapGenerator:
  - name: recyclarr-config
    files:
      - recyclarr.yml=templates/recyclarr.yml
generatorOptions:
  disableNameSuffixHash: true