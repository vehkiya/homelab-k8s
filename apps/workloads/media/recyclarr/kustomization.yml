apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cronjob.yml
  - secret.yml
  - network-policy.yml

labels:
  - pairs:
      app.kubernetes.io/name: recyclarr
      app.kubernetes.io/part-of: media-services

images:
  - name: ghcr.io/recyclarr/recyclarr
    newTag: 8.7.0@sha256:2d6107f758d882a59fe9d646aa54fa8a5a4fb7a40995125fade575652a3f7871

configMapGenerator:
  - name: recyclarr-config
    files:
      - recyclarr.yml=templates/recyclarr.yml
generatorOptions:
  disableNameSuffixHash: true