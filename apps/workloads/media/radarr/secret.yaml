apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr-external-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vaultwarden-fields

  target:
    name: radarr-secrets
    creationPolicy: Owner

  data:
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: api_key
    - secretKey: POSTGRES_USER
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: postgres_user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: postgres_password
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: postgres_port
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: postgres_host
    - secretKey: POSTGRES_MAIN_DB
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: postgres_main_db
    - secretKey: POSTGRES_LOG_DB
      remoteRef:
        key: f5a82ad7-3e61-4ca2-9577-bafeb4e7c4b0
        property: postgres_log_db