apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - network-policies.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml

configMapGenerator:
  - name: posterizarr-configmap
    files:
      - config.json.template=templates/config.json
generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: posterizarr
      app.kubernetes.io/part-of: media-services
images:
  - name: alpine/k8s
    newTag: 1.35.3@sha256:097aa60cbef561146757c7494468e9d7b04d843597ad1a1515ed09d0708c8014
  - name: ghcr.io/fscorrupt/posterizarr
    newTag: 2.2.37@sha256:3caf82e4b7cea9781b079c219bc4085b5832b7fbb60443cd83c6b6bbea016b06
