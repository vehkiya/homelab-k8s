apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - network-policies.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml

configMapGenerator:
  - name: posterizarr-configmap
    files:
      - config.json.template=templates/config.json
generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: posterizarr
      app.kubernetes.io/part-of: media-services
images:
  - name: alpine/k8s
    newTag: 1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
  - name: ghcr.io/fscorrupt/posterizarr
    newTag: 2.2.49@sha256:e6cad8d01d7718c9617cecb0c4764111846bdea7be5e952e19e0cc932237f5f6
