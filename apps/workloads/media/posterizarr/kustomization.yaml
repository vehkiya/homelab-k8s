apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - network-policies.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml

configMapGenerator:
  - name: posterizarr-configmap
    files:
      - config.json.template=templates/config.json
generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: posterizarr
      app.kubernetes.io/part-of: media-services
images:
  - name: alpine/k8s
    newTag: 1.35.4@sha256:d9aeef2665287b9918bc57c539ba95382ba4c8d52c8b1310df5666a89d9a3d04
  - name: ghcr.io/fscorrupt/posterizarr
    newTag: 2.2.38@sha256:eaf474e4027e5b785d48bd5d2dca5fdc5218aea44f7e85190b4d01042e93c349
