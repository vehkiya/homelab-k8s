apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tautulli-policy
spec:
  endpointSelector:
    matchLabels:
      app: tautulli
  # ----=== Ingress ===----
  ingress:
    # === Allow access from other apps ===
    - fromEndpoints:
        - matchLabels:
            app: seerr
        - matchLabels:
            app: kometa
      toPorts:
        - ports:
            - port: "web-ui"
              protocol: "TCP"

  # ----=== Egress ===----
  egress:
    # === Allow access to services ===
    - toServices:
        - k8sService:
            serviceName: plex-ui
            namespace: media
        - k8sService:
            serviceName: ntfy
            namespace: automation
    # === Allow access to external for metadata ===
    - toEntities:
        - "world"
      toPorts:
        # Only allow HTTP/S for indexers
        - ports:
            - port: "443"
              protocol: TCP
            - port: "443"
              protocol: UDP
            - port: "80"
              protocol: TCP
