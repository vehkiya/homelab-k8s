apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: automation
helmCharts:
  - name: n8n
    repo: oci://ghcr.io/n8n-io/n8n-helm-chart
    version: 1.8.0 
    releaseName: n8n
    namespace: automation
    includeCRDs: true
    valuesFile: values/values.yml

resources:
  - configmap.yaml
  - secrets.yaml
  - db-credentials.yaml
  - http-route.yaml
  - external-http-route.yaml
  - rate-limit.yaml
  - network-policy.yaml
  - redis.yaml
  - redis-network-policy.yaml
images:
  - name: busybox
    newTag: 1.38@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0
  - name: docker.n8n.io/n8nio/n8n
    newTag: 2.22.2@sha256:bf26d48e2be3d8a2bda50c5494dc603f495c2d98bd186793773b0204f3e7e0c3
patches:
  - path: hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: n8n-webhook-processor
