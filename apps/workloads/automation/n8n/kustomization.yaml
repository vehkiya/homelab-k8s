apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: automation
helmCharts:
  - name: n8n
    repo: oci://ghcr.io/n8n-io/n8n-helm-chart
    version: 1.11.0 
    releaseName: n8n
    namespace: automation
    includeCRDs: true
    valuesFile: values/values.yml

resources:
  - configmap.yaml
  - secrets.yaml
  - db-credentials.yaml
  - http-route.yaml
  - external-http-route.yaml
  - rate-limit.yaml
  - network-policy.yaml
  - redis.yaml
  - redis-network-policy.yaml
images:
  - name: busybox
    newTag: 1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
  - name: docker.n8n.io/n8nio/n8n
    newTag: 2.32.0@sha256:8a6dde6ff9a511b39decc6145a0b4628f819e0385e99172a0ed26b7a436cf69f
patches:
  - path: hpa-patch.yaml
    target:
      kind: HorizontalPodAutoscaler
      name: n8n-webhook-processor
