apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n-external-route
spec:
  parentRefs:
    - name: external-gateway
      namespace: traefik
  hostnames:
    - "n8n.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /webhook-test
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: n8n-webhook-rate-limit
      backendRefs:
        - name: n8n-main
          port: 5678
    - matches:
        - path:
            type: PathPrefix
            value: /webhook
        - path:
            type: PathPrefix
            value: /webhook-waiting
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: n8n-webhook-rate-limit
      backendRefs:
        - name: n8n-webhook-processor
          port: 5678
