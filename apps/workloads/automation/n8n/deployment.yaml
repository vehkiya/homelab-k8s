apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        networking/expose-web-ui: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n
          command:
            - /bin/sh
          args:
            - -c
            - sleep 5; n8n start
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: web-ui
              containerPort: 5678
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          envFrom:
            - secretRef:
                name: n8n-db-credentials
            - secretRef:
                name: n8n-secrets
            - configMapRef:
                name: n8n-config
          # TODO: future plans - add S3 target for binary objects
