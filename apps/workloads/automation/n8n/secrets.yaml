apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secrets
spec:
  refreshInterval: 1h
  target:
    creationPolicy: Owner
    name: n8n-secrets
  data:
    - remoteRef:
        key: 3819ee8a-d920-48a6-93f4-a47058e4783c
        property: N8N_LICENSE_ACTIVATION_KEY
      secretKey: N8N_LICENSE_ACTIVATION_KEY
      sourceRef:
        storeRef:
          name: vaultwarden-fields
          kind: ClusterSecretStore
    - remoteRef:
        key: 3819ee8a-d920-48a6-93f4-a47058e4783c
        property: REDIS_PASSWORD
      secretKey: QUEUE_BULL_REDIS_PASSWORD
      sourceRef:
        storeRef:
          name: vaultwarden-fields
          kind: ClusterSecretStore
