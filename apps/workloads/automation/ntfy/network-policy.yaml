apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ntfy-policy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ntfy

  # Allow Ingress from client apps
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: iot
            app: home-assistant
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: radarr
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: sonarr
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: seerr
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: notifications
            app: uptime-kuma
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: autobrr
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: automation
            app.kubernetes.io/name: n8n
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: bazarr
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: tautulli
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: qbittorrent
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            app: kometa
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
            k8s:app: prowlarr
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP

  # Allow all Egress for ntfy to function (upstream, email, push servers)
  # Restricting this might break notifications if IP ranges change.
  egress:
    - toEntities:
        - world
        - cluster
