apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  labels:
    app.kubernetes.io/name: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ntfy
        networking/expose-web-ui: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: Always
      initContainers:
        - name: prepare-config
          image: alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Generating config..."

              if [ -n "$NTFY_AUTH_USERS" ]; then
                NTFY_AUTH_USERS_FORMATTED=""
                for user in $(echo "$NTFY_AUTH_USERS" | tr ',' ' '); do
                  NTFY_AUTH_USERS_FORMATTED="${NTFY_AUTH_USERS_FORMATTED}\n  - $user"
                done
              else
                NTFY_AUTH_USERS_FORMATTED=" []"
              fi

              if [ ! -f /etc/ntfy-template/server.yml.template ]; then
                echo "Template not found!"
                exit 1
              fi

              TEMPLATE=$(cat /etc/ntfy-template/server.yml.template)
              CONFIG=$(echo "$TEMPLATE" | sed \
                -e "s|\$NTFY_WEB_PUSH_PUBLIC_KEY|$NTFY_WEB_PUSH_PUBLIC_KEY|g" \
                -e "s|\$NTFY_WEB_PUSH_PRIVATE_KEY|$NTFY_WEB_PUSH_PRIVATE_KEY|g" \
                -e "s|\$NTFY_WEB_PUSH_EMAIL_ADDRESS|$NTFY_WEB_PUSH_EMAIL_ADDRESS|g" \
                -e "s|\$NTFY_AUTH_USERS_FORMATTED|$NTFY_AUTH_USERS_FORMATTED|g")
              
              printf "$CONFIG" > /etc/ntfy/server.yml

              echo "Config generated:"
              cat /etc/ntfy/server.yml
          envFrom:
            - secretRef:
                name: ntfy-secret
            - configMapRef:
                name: ntfy-config
          volumeMounts:
            - name: config-template
              mountPath: /etc/ntfy-template
            - name: config
              mountPath: /etc/ntfy
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
      containers:
        - name: ntfy
          image: binwiederhier/ntfy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          args: ["serve"]
          ports:
            - name: web-ui
              containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy/server.yml
              subPath: server.yml
            - name: data
              mountPath: /var/lib/ntfy
            - name: cache
              mountPath: /var/cache/ntfy
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              memory: "128Mi"
              cpu: "500m"
      volumes:
        - name: config-template
          configMap:
            name: ntfy-config
        - name: config
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
        - name: cache
          emptyDir: {}
