apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: automation
resources:
  - pvc.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - network-policy.yaml

images:
  - name: binwiederhier/ntfy
    newTag: v2.20.1@sha256:34e68dedfe6f324f30d4b07081a2a69a58d7299a289e1bc4a89081a4432bf1e9
  - name: alpine
    newTag: 3.23.3@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659

configMapGenerator:
  - name: ntfy-config
    files:
      - server.yml.template=template/server.yml

generatorOptions:
  disableNameSuffixHash: true