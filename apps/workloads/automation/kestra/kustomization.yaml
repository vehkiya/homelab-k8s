apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: automation

resources:
  - secrets.yaml
  - webserver.yaml
  - executor.yaml
  - worker.yaml
  - hpa.yaml
  - http-route.yaml
  - network-policy.yaml

configMapGenerator:
  - name: kestra-config
    files:
      - application.yml=templates/application.yml


images:
  - name: kestra/kestra
    newTag: v1.3.18@sha256:133901701c4552de2f0ad9d869c81925a0fe453b1508bf0f9711d925e78c8de9
