apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: automation

resources:
  - secrets.yaml
  - webserver.yaml
  - executor.yaml
  - worker.yaml
  - hpa.yaml
  - http-route.yaml
  - network-policy.yaml

configMapGenerator:
  - name: kestra-config
    files:
      - application.yml=templates/application.yml


images:
  - name: kestra/kestra
    newTag: v1.3.21@sha256:694526ebe65d2f182537c23df32861a121e1d1468a1a2c69efb4a14e714a47cb
