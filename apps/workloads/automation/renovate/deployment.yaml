apiVersion: apps/v1
kind: Deployment
metadata:
  name: renovate-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: renovate-server
  template:
    metadata:
      labels:
        app: renovate-server
        networking/expose-http-api: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: renovate-server
          image: ghcr.io/mend/renovate-ce
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
              name: http-api
          envFrom:
            - configMapRef:
                name: renovate-env
          env:
            - name: RENOVATE_REVIEWERS
              valueFrom:
                secretKeyRef:
                  name: renovate-secrets
                  key: DEFAULT_PR_REVIEWERS
            - name: MEND_RNV_GITHUB_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: renovate-secrets
                  key: RENOVATE_PRIVATE_KEY
            - name: MEND_RNV_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: renovate-secrets
                  key: RENOVATE_WEBHOOK_SECRET
            - name: MEND_RNV_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: renovate-secrets
                  key: RENOVATE_LICENSE_KEY
            - name: DOCKER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: renovate-secrets
                  key: DOCKER_USERNAME
            - name: DOCKER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: renovate-secrets
                  key: DOCKER_PASSWORD
          volumeMounts:
            - name: cache-volume
              mountPath: "/tmp/renovate/cache"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: cache-volume
          emptyDir: {}
