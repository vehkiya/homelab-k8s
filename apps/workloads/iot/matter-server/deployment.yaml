apiVersion: apps/v1
kind: Deployment
metadata:
  name: matter-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matter-server
  template:
    metadata:
      labels:
        app: matter-server
        networking/expose-web-ui: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{ "name": "macvlan-iot", "mac": "02:00:00:00:20:00" }]'
    spec:
      hostNetwork: false
      initContainers:
        - name: init-sysctl
          image: busybox
          command:
            - sh
            - -c
            - |
              sysctl -w net.ipv6.conf.net1.accept_ra=2
              sysctl -w net.ipv6.conf.net1.accept_ra_rt_info_max_plen=64
              ip route add 224.0.0.0/4 dev net1 || true
              ip -6 route add ff00::/8 dev net1 || true
              ip -6 route replace fd2f:741e:f59b:1::/64 via fe80::ff:fe00:1000 dev net1 metric 100 || true
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "25m"
              memory: "32Mi"
      containers:
        - image: ghcr.io/matter-js/matterjs-server
          name: matter-server
          command:
            - sh
            - -c
            - |
              sed -i 's/messageCounterBitmap = 4294967295/messageCounterBitmap = 0/g' /app/node_modules/@matter/protocol/dist/esm/protocol/MessageReceptionState.js || true
              exec node --enable-source-maps /app/node_modules/matter-server/dist/esm/MatterServer.js
          env:
            - name: PRODUCTION_MODE
              value: "true"
            - name: PRIMARY_INTERFACE
              value: "net1"
            - name: STORAGE_PATH
              value: "/data"
            - name: LOG_LEVEL
              value: "debug"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          ports:
            - containerPort: 5580
              name: web-ui
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: matter-data-pvc
