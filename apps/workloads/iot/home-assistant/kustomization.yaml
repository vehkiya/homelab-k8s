apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iot

labels:
  - pairs:
      app.kubernetes.io/name: home-assistant

resources:
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - nad.yaml
  - network-policy.yaml

configMapGenerator:
  - name: home-assistant-config
    files:
      - configuration.yaml.template=template/configuration.yaml

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/home-operations/home-assistant
    newTag: 2026.6.4@sha256:4d510e8826491e17049ede51d8c89afba28791e7bf7ba72ab8411e66e02255e6
  - name: ghcr.io/hononeko/k8s-config-tools
    newTag: 0.1.1@sha256:fb03e8e7910a51472309b361675f38da44ee398ab6ec64b020b660d4d0d4e400
