apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iot

labels:
  - pairs:
      app.kubernetes.io/name: home-assistant

resources:
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - nad.yaml
  - network-policy.yaml

configMapGenerator:
  - name: home-assistant-config
    files:
      - configuration.yaml.template=template/configuration.yaml

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/home-operations/home-assistant
    newTag: 2026.6.3@sha256:82db7a297c96a0288559c5f2849878168c14a06557edc114084d874268c92a9a
  - name: ghcr.io/hononeko/k8s-config-tools
    newTag: 0.1.0@sha256:fa8e55d5c4b2971076cc2dfd70ff15f1c1734245de6bb109190e744a86cb9e94
