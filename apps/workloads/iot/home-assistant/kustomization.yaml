apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iot

labels:
  - pairs:
      app.kubernetes.io/name: home-assistant

resources:
  - deployment.yaml
  - service.yaml
  - http-route.yaml
  - nad.yaml
  - network-policy.yaml

configMapGenerator:
  - name: home-assistant-config
    files:
      - configuration.yaml.template=template/configuration.yaml

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/home-operations/home-assistant
    newTag: 2026.4.4@sha256:589e4c1c93025d01320c14329427197c8b52d4f2e241a6bc1d6207837e07b4a7
  - name: hairyhenderson/gomplate
    newTag: v5.0-alpine@sha256:e9f830456c24b92dc8f59591d9604c90af6b7102c503f9834e716eb1002440e9
