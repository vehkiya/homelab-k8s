apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iot

labels:
  - pairs:
      app.kubernetes.io/name: go2rtc

resources:
  - deployment.yaml
  - secret.yaml
  - service.yaml
  - http-route.yaml
  - network-policy.yaml

configMapGenerator:
  - name: go2rtc-config-template
    files:
      - go2rtc.yaml=templates/go2rtc.yaml

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/alexxit/go2rtc
    newTag: 1.9.14@sha256:675c318b23c06fd862a61d262240c9a63436b4050d177ffc68a32710d9e05bae
  - name: ghcr.io/hononeko/k8s-config-tools
    newTag: 0.1.0@sha256:fa8e55d5c4b2971076cc2dfd70ff15f1c1734245de6bb109190e744a86cb9e94
