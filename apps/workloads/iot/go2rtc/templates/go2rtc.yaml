# go2rtc configuration
# https://github.com/AlexxIT/go2rtc#configuration
streams:
  doorbell:
    - hass:Doorbell Repeater-B53F
    - ffmpeg:doorbell#audio=opus
  g3_camera:
    - hass:Camera-Hub-G3-B2BD
    - ffmpeg:g3_camera#audio=opus
hass:
  config: "/config/hass"
  api: http://home-assistant.iot.svc.cluster.local:8123
api:
  listen: ":1984"
  username: {{ .Env.API_USERNAME }}
  password: {{ .Env.API_PASSWORD }}
rtsp:
  listen: ":8554"
  username: {{ .Env.API_USERNAME }}
  password: {{ .Env.RTSP_PASSWORD }}
webrtc:
  listen: ":8555"
  candidates:
    - "10.10.1.130:8555"
