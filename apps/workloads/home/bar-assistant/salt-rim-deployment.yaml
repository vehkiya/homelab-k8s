# Deployment for the Salt Rim Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: salt-rim
  labels:
    app: salt-rim
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: salt-rim
  template:
    metadata:
      labels:
        app: salt-rim
        networking/expose-web-ui: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - bar-assistant
                topologyKey: kubernetes.io/hostname
      containers:
        - name: salt-rim-frontend
          image: ghcr.io/karlomikus/salt-rim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            # Explicitly map needed vars from ConfigMap
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: bar-assistant-config
                  key: API_URL
            - name: MEILISEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: bar-assistant-config
                  key: MEILISEARCH_URL
          ports:
            - containerPort: 8080
              name: web-ui
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
