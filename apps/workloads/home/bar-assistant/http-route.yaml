apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bar-app-httproute
spec:
  parentRefs:
    - name: internal-gateway
      namespace: traefik
  hostnames:
    - "bar.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: bar-assistant
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /storage
      backendRefs:
        - name: bar-assistant
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: salt-rim
          port: 8080
