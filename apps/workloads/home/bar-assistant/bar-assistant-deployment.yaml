# Deployment for the Bar Assistant Backend Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bar-assistant
  labels:
    app: bar-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bar-assistant
  template:
    metadata:
      labels:
        app: bar-assistant
        networking/expose-http-api: "true"
    spec:
      securityContext:
        runAsUser: 33
        runAsGroup: 33
        runAsNonRoot: true
        fsGroup: 33
        fsGroupChangePolicy: Always
      initContainers:
        - name: volume-permissions
          image: busybox
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          command:
            ["sh", "-c", "chown 33:33 /var/www/cocktails/storage/bar-assistant"]
          volumeMounts:
            - name: bar-data
              mountPath: /var/www/cocktails/storage/bar-assistant
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      containers:
        - name: bar-assistant-server
          image: ghcr.io/karlomikus/barassistant
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: bar-assistant-config
            - secretRef:
                name: bar-assistant-secrets
          # Map MEILI_MASTER_KEY from Secret explicitly to MEILISEARCH_KEY env var
          env:
            - name: MEILISEARCH_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-kubernetes-master-key
                  key: MEILI_MASTER_KEY
            - name: REDIS_HOST
              value: redis-bar-assistant
            - name: PHP_FPM_PM_CONTROL
              value: "ondemand"
            - name: PHP_FPM_PM_MAX_CHILDREN
              value: "5"
            - name: PHP_MEMORY_LIMIT
              value: "192M"
            - name: PHP_OPCACHE_MEMORY_CONSUMPTION
              value: "64"
          ports:
            - containerPort: 8080
              name: http-api
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http-api
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http-api
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: bar-data
              mountPath: /var/www/cocktails/storage/bar-assistant
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: bar-data
          persistentVolumeClaim:
            claimName: bar-assistant-config-pvc
