apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home

labels:
  - pairs:
      app.kubernetes.io/name: miniflux

# List of resources to include
resources:
  - secrets.yaml
  - configmap.yaml
  - deployment.yaml
