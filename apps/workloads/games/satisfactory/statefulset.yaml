apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: satisfactory
  namespace: games
  labels:
    app: satisfactory
spec:
  serviceName: satisfactory
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: satisfactory
  template:
    metadata:
      labels:
        app: satisfactory
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - performance
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: satisfactory
          image: wolveix/satisfactory-server
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7777
              name: game-udp
              protocol: UDP
            - containerPort: 7777
              name: game-tcp
              protocol: TCP
            - containerPort: 8888
              name: server-api
              protocol: TCP
          envFrom:
            - configMapRef:
                name: satisfactory-config
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: "8Gi"
              cpu: "2000m"
            limits:
              memory: "16Gi"
              cpu: "4000m"
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
        - name: save-backup
          image: alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync inotify-tools &&
              while true; do
                rsync -a --no-owner --no-group --delete --log-file=/dev/stderr /config/saved/ /backups/saved/
                inotifywait -r -e create,close_write,moved_to /config/saved/
              done
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: backups
              mountPath: /backups
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: satisfactory-data-pvc
        - name: backups
          persistentVolumeClaim:
            claimName: satisfactory-backup-pvc
