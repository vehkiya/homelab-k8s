apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: romm-ui-external-route
spec:
  parentRefs:
    - name: external-gateway
      namespace: traefik
  hostnames:
    - "romm.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: romm-rate-limit
      backendRefs:
        - name: romm-ui
          port: 8080
