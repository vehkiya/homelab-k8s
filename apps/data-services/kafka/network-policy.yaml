apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: strimzi-kafka-operator
spec:
  endpointSelector:
    matchLabels:
      name: strimzi-cluster-operator
      strimzi.io/kind: cluster-operator
  egress:
    - toEntities:
        - kube-apiserver
        - cluster
    - toEndpoints:
        - matchLabels:
            strimzi.io/cluster: renoneko-cluster
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9093"
              protocol: TCP
    # Allow operator to reach custom resource endpoints
    - toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
