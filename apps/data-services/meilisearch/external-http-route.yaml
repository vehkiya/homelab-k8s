apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: meilisearch-external-route
spec:
  parentRefs:
    - name: external-gateway
      namespace: traefik
  hostnames:
    - "meilisearch.kerrlab.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: meilisearch-rate-limit
      backendRefs:
        - name: meilisearch-kubernetes
          port: 7700
