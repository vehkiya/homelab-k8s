apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets
# Make serverSideApply=true
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.8.0
    releaseName: external-secrets
    namespace: external-secrets
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - bitwarden-cli.yaml
  - cluster-secret-store.yaml
  - network-policy.yaml
  - bw-sync-cronjob.yaml
images:
  - name: ghcr.io/hononeko/bw-cli
    newTag: 2026.6.0@sha256:0c2a651a6eac00c3601ee6b24ba2365585419801cd9481572f414a4e4a3077e7
  - name: alpine/k8s
    newTag: 1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
