apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets
# Make serverSideApply=true
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.2.0
    releaseName: external-secrets
    namespace: external-secrets
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - bitwarden-cli.yaml
  - cluster-secret-store.yaml
  - network-policy.yaml
  - bw-sync-cronjob.yaml
images:
  - name: ghcr.io/hononeko/bw-cli
    newTag: 2026.1.0@sha256:94574a70497d48354ad09c4a6e065379720cebf83aea286d1db3df60e0773d17
  - name: alpine/k8s
    newTag: 1.35.3@sha256:80cf3f1a55c19009223245c8b680156ff4e41c0a4778eb4b121c67f4946bc469
