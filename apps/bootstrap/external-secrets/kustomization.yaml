apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets
# Make serverSideApply=true
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.3.0
    releaseName: external-secrets
    namespace: external-secrets
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - bitwarden-cli.yaml
  - cluster-secret-store.yaml
  - network-policy.yaml
  - bw-sync-cronjob.yaml
images:
  - name: ghcr.io/hononeko/bw-cli
    newTag: 2026.4.1@sha256:5209b2383775737d1dc692aba371969ec9e61c0d38dd22775c2550b74132ede2
  - name: alpine/k8s
    newTag: 1.35.4@sha256:d9aeef2665287b9918bc57c539ba95382ba4c8d52c8b1310df5666a89d9a3d04
