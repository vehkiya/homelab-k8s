apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets
# Make serverSideApply=true
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.7.0
    releaseName: external-secrets
    namespace: external-secrets
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - bitwarden-cli.yaml
  - cluster-secret-store.yaml
  - network-policy.yaml
  - bw-sync-cronjob.yaml
images:
  - name: ghcr.io/hononeko/bw-cli
    newTag: 2026.6.0@sha256:9d1e67cd5d7bc3748df92dd0a06e9db560176de4396bc119532cf68d291f31a5
  - name: alpine/k8s
    newTag: 1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
