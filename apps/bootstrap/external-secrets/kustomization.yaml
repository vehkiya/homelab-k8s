apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets
# Make serverSideApply=true
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.5.0
    releaseName: external-secrets
    namespace: external-secrets
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - bitwarden-cli.yaml
  - cluster-secret-store.yaml
  - network-policy.yaml
  - bw-sync-cronjob.yaml
images:
  - name: ghcr.io/hononeko/bw-cli
    newTag: 2026.4.1@sha256:724a70728f73e49ec8ff7b83534548be5a60dd3be04376e3169998fd30938f66
  - name: alpine/k8s
    newTag: 1.36.1@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668
