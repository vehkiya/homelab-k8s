apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "cnp-coredns"
  namespace: kube-system
spec:
  description: "Allows CoreDNS to receive queries, contact kube-apiserver for service discovery, and external resolvers for public DNS."
  endpointSelector:
    matchLabels:
      k8s-app: coredns
  ingress:
    # Rule 1: Allow DNS Queries from all endpoints
    - fromEndpoints:
        - {}
      toPorts:
        - ports:
            - port: "53"
              protocol: "UDP"
            - port: "53"
              protocol: "TCP"
  egress:
    # Rule 1: Allow communication with kube-apiserver
    - toEntities:
        - "kube-apiserver"
        - "host"
    # Rule 2: Allow fallback to Cloudflare DNS
    - toCIDR:
        - "1.1.1.1/32"
        - "1.0.0.1/32"
        - "10.10.1.1/32" # Allow talking to the Router/Upstream DNS
      toPorts:
        - ports:
            - port: "53"
              protocol: "UDP"
            - port: "53"
              protocol: "TCP"
