apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - namespace.yaml
  - secrets.yaml
  - oidc-secrets.yaml
  - daemonset.yaml
  - http-route.yaml
  - service.yaml
  - network-policy.yaml
  - redis-cluster.yaml
  - redis-network-policy.yaml
images:
  - name: alpine/k8s
    newTag: 1.36.0@sha256:c105e4eaa265c617e43be34fffc7d9961de76b65a1e520179ed61e2f3a9fabf7
  - name: ghcr.io/authelia/authelia
    newTag: 4.39.19@sha256:0c824dcab1ae97c56bf673c5e77fe8cc6bcd400564555140cc8002a12c6b6463

configMapGenerator:
  - name: authelia-config
    files:
      - configuration-template.yml=templates/configuration.yaml

generatorOptions:
  disableNameSuffixHash: true
