apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - namespace.yaml
  - secrets.yaml
  - oidc-secrets.yaml
  - daemonset.yaml
  - http-route.yaml
  - service.yaml
  - network-policy.yaml
  - redis-cluster.yaml
  - redis-network-policy.yaml
images:
  - name: alpine/k8s
    newTag: 1.35.3@sha256:097aa60cbef561146757c7494468e9d7b04d843597ad1a1515ed09d0708c8014
  - name: ghcr.io/authelia/authelia
    newTag: 4.39.17@sha256:4f80931cb4180a83b3504962cce1efb3092364387658f1d28ca48584028e382a

configMapGenerator:
  - name: authelia-config
    files:
      - configuration-template.yml=templates/configuration.yaml

generatorOptions:
  disableNameSuffixHash: true
