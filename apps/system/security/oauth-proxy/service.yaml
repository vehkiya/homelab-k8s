# core/oauth-proxy/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: oauth-proxy
  namespace: security
spec:
  type: LoadBalancer
  ports:
    - name: web-ui
      port: 4180
      targetPort: web-ui
      protocol: TCP
  externalTrafficPolicy: Local
  trafficDistribution: PreferSameNode # 1.35 feature
  selector:
    app: oauth-proxy
