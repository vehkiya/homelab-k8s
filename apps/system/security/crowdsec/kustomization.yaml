apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security

resources:
  - secrets.yaml
  - network-policy.yaml

helmCharts:
  - name: crowdsec
    repo: https://crowdsecurity.github.io/helm-charts
    version: 0.24.0
    releaseName: crowdsec
    namespace: security
    valuesFile: values.yaml

configMapGenerator:
  - name: crowdsec-config-template
    files:
      - config.yaml=templates/config.yaml
  - name: crowdsec-agent-config
    files:
      - config.yaml.local=templates/agent-config.yaml
generatorOptions:
  disableNameSuffixHash: true

images:
  - name: ghcr.io/hononeko/k8s-config-tools
    newTag: 0.1.0@sha256:fa8e55d5c4b2971076cc2dfd70ff15f1c1734245de6bb109190e744a86cb9e94
