apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: longhorn-system
helmCharts:
  - name: longhorn
    namespace: longhorn-system
    repo: https://charts.longhorn.io
    version: 1.11.0
    releaseName: longhorn
    valuesFile: values/values.yaml
    includeCRDs: true
resources:
  - longhorn-namespace.yaml
  - longhorn-http-route.yaml
  - network-policy.yaml
  - storageclass-retain.yaml

patches:
  - path: patch-longhorn-ui-deployment.yaml
  - path: patch-longhorn-frontend-service.yaml