persistence:
  defaultClassReplicaCount: 3
ingress:
  enabled: false

defaultSettings:
  # Do not automatically create disks on all nodes. 
  # This allows us to control which nodes provide storage via labels.
  createDefaultDiskLabeledNodes: true
  # Ensure control planes aren't used by default unless necessary.
  # We will keep this false for now because we need lab-2 and lab-3.
  disableSchedulingOnControlPlane: false
  # Set to 15% for smaller disks
  storageMinimalAvailablePercentage: 15
  # Limit CPU impact on N100s during rebuilding
  concurrentReplicaRebuildPerNodeLimit: 1
  # Default Backup Target
  backupTarget: "s3://longhorn-backups@us-east-1/"
  backupTargetCredentialSecret: "s3-backup-secret"

image:
  longhorn:
    instanceManager:
      repository: longhornio/longhorn-instance-manager
      tag: v1.11.0
