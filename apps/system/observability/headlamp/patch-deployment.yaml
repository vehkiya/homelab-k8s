apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
spec:
  template:
    metadata:
      labels:
        networking/expose-web-ui: "true"
    spec:
      containers:
        - name: headlamp
          ports:
            - name: web-ui
              containerPort: 4466
              protocol: TCP
          livenessProbe:
            httpGet:
              port: web-ui
          readinessProbe:
            httpGet:
              port: web-ui
