apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: headlamp-egress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  egress:
    # 1. Allow API Access (Critical)
    - toEntities:
        - kube-apiserver
        - host
        - remote-node
    - toCIDR:
        - 10.96.0.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: "TCP"

    # 2. Allow Hairpinning to Traefik (Internal LoadBalancer IP)
    - toCIDR:
        - 10.10.1.16/32
      toPorts:
        - ports:
            - port: "443"
              protocol: "TCP"
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: traefik
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "9443"
              protocol: "TCP"
            - port: "443"
              protocol: "TCP"

    # 3. Allow OIDC Provider (If you use Google/Dex/etc for login)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: "TCP"