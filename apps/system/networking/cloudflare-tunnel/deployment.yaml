# WARNING / NOTE: When using cloudflared as an active ingress proxy:
# The source IP seen by Traefik will be this cloudflared pod's internal IP.
# Since Traefik's trustedIPs config does not trust pod CIDRs by default,
# Traefik will reject the X-Forwarded-For / CF-Connecting-IP headers, identifying
# the client as the cloudflared pod. If CrowdSec is deployed, it will see all attacks
# coming from this pod and may ban it, causing a total outage of tunnel traffic.
# Mitigation: Configure the 'cloudflarewarp' Traefik plugin or route traffic through
# the BGP LoadBalancer IP to preserve the original Cloudflare Edge source IPs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2000"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: cloudflared
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          args:
            - tunnel
            - --metrics
            - 0.0.0.0:2000
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-tunnel-credentials
                  key: tunnel-token
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
