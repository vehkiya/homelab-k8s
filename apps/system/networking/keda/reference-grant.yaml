apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: default-traefik-to-keda-interceptor
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: tools
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: home
  to:
    - group: ""
      kind: Service
      name: keda-add-ons-http-interceptor-proxy
