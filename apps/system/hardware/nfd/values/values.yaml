image:
  repository: registry.k8s.io/nfd/node-feature-discovery
  pullPolicy: Always
  tag: v0.18.3

worker:
  config:
    sources:
      pci:
        deviceLabelFields:
          - class
          - vendor
          - device
        deviceClassWhitelist:
          - "03" # Display controllers
          - "0b40" # Co-processors
          - "12" # Processing accelerators
