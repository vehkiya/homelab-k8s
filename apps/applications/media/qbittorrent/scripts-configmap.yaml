apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-scripts
  namespace: media
data:
  notify-n8n.sh: |
    #!/bin/sh
    
    # Map the positional arguments passed by qBittorrent
    HASH="$1"
    NAME="$2"
    TAGS="$3"
    CONTENT_PATH="$4"
    
    # Define the target n8n webhook URL
    WEBHOOK_URL="http://n8n-ui.default.svc.cluster.local:5678/webhook/$WEBHOOK_ID"
    
    # Ensure the secret was successfully injected from the Kubernetes Secret
    if [ -z "$WEBHOOK_SECRET" ]; then
      echo "[ERROR] WEBHOOK_SECRET environment variable is missing!"
      exit 1
    fi

    if [ -z "$WEBHOOK_ID" ]; then
      echo "[ERROR] WEBHOOK_ID environment variable is missing!"
      exit 1
    fi
    
    echo "Sending completion webhook to n8n for: $NAME"
    
    # Fire the request
    curl -X POST "$WEBHOOK_URL" \
      -H "X-n8n-Webhook-Secret: $WEBHOOK_SECRET" \
      -F "hash=$HASH" \
      -F "name=$NAME" \
      -F "tags=$TAGS" \
      -F "path=$CONTENT_PATH"
