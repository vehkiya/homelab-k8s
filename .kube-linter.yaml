# Kube-linter configuration
# For more information, see https://docs.kubelinter.io
checks:
  # Enable all default checks
  all: true
  # Exclude checks that are often too noisy or restrictive for a HomeLab environment
  exclude:
    - "no-read-only-root-fs" # Too many apps need writable /tmp or cache without easy config
    - "run-as-non-root" # Some images/init containers (like chown) need root to function
    - "drop-net-raw-capability" # Needed for VPN sidecar
    - "privilege-escalation-container" # Needed for sysctls on dynamically added interfaces (like macvlan)
    - "privileged-container" # Needed for sysctls on dynamically added interfaces (like macvlan)
    - "host-network" # Needed for CSI drivers (like synology-csi) and network plugins
    - "host-pid" # Needed for CSI node plugins to manage mounts
    - "sensitive-host-mounts" # Needed for CSI node plugins to interact with host devices and mounts
